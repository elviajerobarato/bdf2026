<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benidorm Dance Fest - Normalizador de Pedidos</title>
    <!-- Cargamos SheetJS para gestionar archivos Excel desde el navegador -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #e11d48;
            --primary-hover: #be123c;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        h1 {
            color: var(--text-color);
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .dropzone {
            border: 2px dashed #cbd5e1;
            padding: 40px 20px;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f1f5f9;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .dropzone:hover {
            border-color: var(--primary-color);
            background-color: #fff1f2;
        }

        .dropzone p {
            margin: 0;
            font-size: 15px;
            color: #475569;
        }

        .dropzone .icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .status-success {
            background-color: #dcfce7;
            color: #15803d;
            display: block !important;
        }

        .status-error {
            background-color: #fee2e2;
            color: #b91c1c;
            display: block !important;
        }

        .status-loading {
            background-color: #e0f2fe;
            color: #0369a1;
            display: block !important;
        }

        footer {
            margin-top: 25px;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><a href="#">BENIDORM DANCE FEST</a></h1>
    <p class="subtitle">Normalizador de Pedidos para Administración & Backend</p>
    
    <!-- Zona de arrastre del archivo -->
    <div class="dropzone" id="dropzone" onclick="document.getElementById('excelFile').click()">
        <span class="icon">📊</span>
        <p><strong>Haz clic para seleccionar</strong> o arrastra el archivo <br><code>VENTAS BDF EXCEL HASTA 20626.xlsx</code></p>
    </div>
    
    <input type="file" id="excelFile" accept=".xlsx, .xls">
    
    <div id="status"></div>
    
    <footer>Sincronización de campos y desglose automático de Tickets (Cantidad = 1)</footer>
</div>

<script>
    const fileInput = document.getElementById('excelFile');
    const dropzone = document.getElementById('dropzone');
    const statusDiv = document.getElementById('status');

    // Gestión de eventos de arrastrar y soltar
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = 'var(--primary-color)'; });
    dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = '#cbd5e1'; });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.borderColor = '#cbd5e1';
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            procesarExcel(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            procesarExcel(e.target.files[0]);
        }
    });

    function mostrarStatus(mensaje, tipo) {
        statusDiv.className = '';
        if (tipo === 'success') statusDiv.classList.add('status-success');
        if (tipo === 'error') statusDiv.classList.add('status-error');
        if (tipo === 'loading') statusDiv.classList.add('status-loading');
        statusDiv.innerText = mensaje;
    }

    function procesarExcel(file) {
        mostrarStatus("Leyendo y procesando el fichero original...", "loading");
        
        const reader = new FileReader();
        reader.onerror = () => mostrarStatus("Error al leer el archivo físico.", "error");
        
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Seleccionar la hoja correcta ('Pedidos' o la primera que encuentre)
                const sheetName = workbook.SheetNames.includes('Pedidos') ? 'Pedidos' : workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // Convertir a formato JSON matricial
                const rows = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                
                if (rows.length === 0) {
                    mostrarStatus("El archivo Excel está vacío.", "error");
                    return;
                }

                // Detectar nombres de columnas limpiando espacios rebeldes
                const originalKeys = Object.keys(rows[0]);
                const keyMap = {};
                originalKeys.forEach(k => { keyMap[k.trim()] = k; });

                const colPedido = keyMap['Nº de pedido'] || originalKeys[0];
                const colApellidos = keyMap['Apellidos'] || originalKeys[1];
                const colNombre = keyMap['Nombre'] || originalKeys[2];
                const colProducto = keyMap['Producto'] || originalKeys[3];
                const colVariacion = keyMap['Variación'] || originalKeys[5] || 'Variación';

                const flatRows = [];

                // Lógica de desglose relacional
                rows.forEach(row => {
                    const pedido = String(row[colPedido] || "").trim();
                    const apellidos = String(row[colApellidos] || "").trim();
                    const nombre = String(row[colNombre] || "").trim();
                    const producto = String(row[colProducto] || "").trim();
                    const variacionFull = String(row[colVariacion] || "").trim();

                    if (!pedido && !variacionFull) return; // Fila vacía

                    if (!variacionFull || variacionFull.toLowerCase() === "nan") {
                        flatRows.push({
                            'Nº de pedido': pedido, 'Apellidos': apellidos, 'Nombre': nombre,
                            'Producto': producto, 'Cantidad': 1, 'Propietario_producto': ""
                        });
                        return;
                    }

                    // Separar por saltos de línea (\n)
                    const lineas = variacionFull.split('\n').map(l => l.trim()).filter(l => l);

                    lineas.forEach(linea => {
                        // Separar por tuberías (|)
                        const partes = linea.split('|').map(p => p.trim()).filter(p => p);
                        
                        let ticketsEnLinea = [];
                        let prefijoExtra = "";

                        partes.forEach(p => {
                            if (p.includes("Ticket")) {
                                ticketsEnLinea.push(prefijoExtra + p);
                            } else {
                                prefijoExtra += p + " | ";
                            }
                        });

                        if (ticketsEnLinea.length === 0) {
                            let valFinal = prefijoExtra.endsWith(" | ") ? prefijoExtra.slice(0, -3) : linea;
                            flatRows.push({
                                'Nº de pedido': pedido, 'Apellidos': apellidos, 'Nombre': nombre,
                                'Producto': producto, 'Cantidad': 1, 'Propietario_producto': valFinal
                            });
                        } else {
                            ticketsEnLinea.forEach(t => {
                                flatRows.push({
                                    'Nº de pedido': pedido, 'Apellidos': apellidos, 'Nombre': nombre,
                                    'Producto': producto, 'Cantidad': 1, 'Propietario_producto': t
                                });
                            });
                        }
                    });
                });

                // Crear nueva hoja de cálculo con los datos desglosados
                const newWorksheet = XLSX.utils.json_to_sheet(flatRows, {
                    header: ['Nº de pedido', 'Apellidos', 'Nombre', 'Producto', 'Cantidad', 'Propietario_producto']
                });
                
                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, 'Pedidos Normalizados');
                
                // Forzar la descarga automática del archivo limpio
                XLSX.writeFile(newWorkbook, 'VENTAS_BDF_COMPLETO_NORMALIZADO.xlsx');
                
                mostrarStatus(`¡Éxito! Generadas ${flatRows.length} filas normalizadas con Cantidad = 1. Descarga completada.`, "success");

            } catch (error) {
                console.error(error);
                mostrarStatus("Error crítico al procesar la estructura del Excel: " + error.message, "error");
            }
        };

        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
