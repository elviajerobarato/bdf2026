<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BDF 2026 | Gestor de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <aside class="w-80 bg-slate-900 text-white h-full flex flex-col shadow-xl">
        <div class="p-6 text-xl font-bold border-b border-slate-700">BDF 2026 Panel</div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
            <button onclick="setFilter('Todos')" class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded transition">Todos</button>
            <button onclick="setFilter('Full pass BDF 2026')" class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded">Full pass BDF 2026</button>
            <button onclick="setFilter('Full pass VIP BDF 2026')" class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded">Full pass VIP BDF 2026</button>
            <button onclick="setFilter('BOOTCAMP Álex Toledo')" class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded">BOOTCAMP Álex Toledo</button>
            <button onclick="setFilter('BOOTCAMP Laura Moreno')" class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded">BOOTCAMP Laura Moreno</button>
            <button onclick="setFilter('Máster Class Tania Cannarsa')" class="w-full text-left px-4 py-2 hover:bg-slate-700 rounded">Máster Class Tania Cannarsa</button>
        </nav>

        <div class="p-4 border-t border-slate-700 bg-slate-800">
            <h3 class="text-xs font-bold text-slate-400 uppercase mb-2">Configuración IA</h3>
            <input type="password" id="geminiKey" placeholder="API Key" class="w-full bg-slate-900 border border-slate-600 p-2 rounded mb-2 text-sm text-white">
            <button onclick="saveKey()" class="w-full bg-blue-600 hover:bg-blue-700 py-1.5 rounded text-xs font-bold uppercase transition">Guardar Key</button>
            
            <h3 class="text-xs font-bold text-slate-400 uppercase mt-4 mb-2">Importar Excel</h3>
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded text-xs font-bold uppercase transition">Seleccionar Archivo</button>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .csv">
        </div>
    </aside>

    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800">Listado de Registros</h1>
            <input type="text" id="searchInput" placeholder="Buscar..." oninput="applyFilters()" class="border px-4 py-2 rounded-lg w-96 shadow-sm">
        </header>

        <section class="flex-1 overflow-auto bg-white shadow rounded-lg border">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100 sticky top-0 z-10 border-b">
                    <tr class="text-slate-600 text-xs uppercase">
                        <th class="p-3">Pedido</th>
                        <th class="p-3">Nombre</th>
                        <th class="p-3">Producto</th>
                        <th class="p-3">Propietario</th>
                        <th class="p-3 text-center">Cant.</th>
                        <th class="p-3 text-center">Retirado</th>
                        <th class="p-3">Fecha</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

<script>
    // Configuración Supabase
    const SUPABASE_URL = 'https://rwicefkwtyjtqmsxmyrf.supabase.co';
    const SUPABASE_KEY = localStorage.getItem('supabase_key') || prompt("Introduce tu API Key de Supabase:");
    if(SUPABASE_KEY) localStorage.setItem('supabase_key', SUPABASE_KEY);
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allData = [];
    let currentFilter = 'Todos';
    document.getElementById('geminiKey').value = localStorage.getItem('gemini_key') || '';

    // Carga Inicial
    async function init() {
        const { data, error } = await db.from('tickets').select('*');
        if (error) { console.error(error); return; }
        allData = data || [];
        applyFilters();
    }

    // Renderizado
    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = data.map(r => `
            <tr class="border-b text-sm ${r.retirado ? 'bg-green-50' : ''}">
                <td class="p-3">${r.pedido_id || '-'}</td>
                <td class="p-3">${r.nombre || ''} ${r.apellidos || ''}</td>
                <td class="p-3">${r.producto || '-'}</td>
                <td class="p-3 font-medium text-blue-900">${r.propietario_producto || r.propietario || '-'}</td>
                <td class="p-3 text-center">${r.cantidad || '1'}</td>
                <td class="p-3 text-center">
                    <input type="checkbox" ${r.retirado ? 'checked' : ''} onchange="toggleRetirado(${r.id}, this.checked)">
                </td>
                <td class="p-3 text-gray-500 text-xs">${r.fecha_retirada || '-'}</td>
            </tr>
        `).join('');
    }

    // Lógica Retirado
    async function toggleRetirado(id, isChecked) {
        const fecha = isChecked ? new Date().toLocaleString("es-ES") : null;
        const { error } = await db.from('tickets')
            .update({ retirado: isChecked, fecha_retirada: fecha })
            .eq('id', id);
        
        if (error) alert("Error: " + error.message);
        else init(); 
    }

    // Filtros
    function setFilter(cat) { currentFilter = cat; applyFilters(); }

    function applyFilters() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(i => {
            const matchesCat = (currentFilter === 'Todos' || (i.producto && i.producto.includes(currentFilter)));
            const matchesSearch = (
                (i.nombre?.toLowerCase().includes(term)) || 
                (i.propietario_producto?.toLowerCase().includes(term)) ||
                (i.propietario?.toLowerCase().includes(term)) ||
                (i.pedido_id?.toString().includes(term))
            );
            return matchesCat && matchesSearch;
        });
        renderTable(filtered);
    }

    // Importación IA
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const apiKey = localStorage.getItem('gemini_key');
        if(!apiKey) return alert("Configura tu API Key de Gemini primero.");
        
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (ev) => {
            alert("Analizando archivo...");
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            try {
                const prompt = `Analiza estos datos. Devuelve un JSON con estas llaves exactas: 
                pedido_id, nombre, apellidos, producto, cantidad, propietario.
                Datos: ${JSON.stringify(rows)}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const result = await response.json();
                const jsonText = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                const cleanData = JSON.parse(jsonText);
                
                const { error } = await db.from('tickets').insert(cleanData);
                if(error) throw error;
                
                alert("Importado con éxito.");
                init();
            } catch(e) { console.error(e); alert("Error al procesar. Revisa la consola."); }
        };
        reader.readAsArrayBuffer(file);
    });

    function saveKey() {
        localStorage.setItem('gemini_key', document.getElementById('geminiKey').value);
        alert("Key guardada.");
    }

    init();
</script>
</body>
</html>
