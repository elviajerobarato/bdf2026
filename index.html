<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BDF 2026 Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans h-screen flex">

    <aside class="w-64 bg-white border-r border-gray-200 h-full flex flex-col">
        <div class="p-6 font-bold text-xl border-b border-gray-200">Menú</div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
            <button onclick="setFilter('Todos')" class="w-full text-left px-4 py-2 hover:bg-blue-50 rounded">Todos</button>
            <button onclick="setFilter('Full pass BDF 2026')" class="w-full text-left px-4 py-2 hover:bg-blue-50 rounded">Full pass BDF 2026</button>
            <button onclick="setFilter('Full pass VIP BDF 2026')" class="w-full text-left px-4 py-2 hover:bg-blue-50 rounded">Full pass VIP BDF 2026</button>
            <button onclick="setFilter('Máster Class Tania Cannarsa')" class="w-full text-left px-4 py-2 hover:bg-blue-50 rounded">Máster Class Tania Cannarsa</button>
            <button onclick="setFilter('Day Pass BDF 2026')" class="w-full text-left px-4 py-2 hover:bg-blue-50 rounded">Day Pass BDF 2026</button>
            <button onclick="setFilter('Night Pass BDF 2026')" class="w-full text-left px-4 py-2 hover:bg-blue-50 rounded">Night Pass BDF 2026</button>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <input type="file" id="fileInput" class="hidden" accept=".csv, .xlsx">
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700">Importar Excel/CSV</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="p-6 border-b border-gray-200 bg-white flex justify-between items-center">
            <h1 class="text-2xl font-bold">BDF 2026 Platform</h1>
            <input type="text" id="searchInput" placeholder="Buscar..." oninput="applyFilters()" class="border px-4 py-2 rounded w-64">
        </header>

        <section class="flex-1 overflow-auto p-6">
            <table class="w-full bg-white shadow rounded border-collapse">
                <thead class="bg-gray-50 sticky top-0">
                    <tr>
                        <th class="p-3 border text-xs uppercase">Pedido</th>
                        <th class="p-3 border text-xs uppercase">Nombre</th>
                        <th class="p-3 border text-xs uppercase">Producto</th>
                        <th class="p-3 border text-xs uppercase">Propietario</th>
                        <th class="p-3 border text-xs uppercase">Retirado</th>
                        <th class="p-3 border text-xs uppercase">Fecha</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>

<script>
    const SUPABASE_URL = 'https://rwicefkwtyjtqmsxmyrf.supabase.co';
    const SUPABASE_KEY = localStorage.getItem('supabase_key') || prompt("Introduce tu API Key:");
    localStorage.setItem('supabase_key', SUPABASE_KEY);
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allData = [];
    let currentFilter = 'Todos';

    async function init() {
        const { data, error } = await db.from('tickets').select('*');
        if (error) { console.error("Error al cargar:", error); return; }
        allData = data;
        applyFilters();
    }

    function getVal(row, key) {
        return row[key] || row[key + ' '] || row[' ' + key] || '';
    }

    async function toggleRetirado(id, isChecked) {
        const fechaActual = isChecked ? new Date().toLocaleString("es-ES", {timeZone: "Europe/Madrid"}) : null;
        await db.from('tickets').update({ retirado: isChecked, fecha_retirada: fechaActual }).eq('id', id);
        init();
    }

    function setFilter(category) { currentFilter = category; applyFilters(); }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(item => {
            const matchesCategory = (currentFilter === 'Todos' || (item.producto && item.producto.includes(currentFilter)));
            return matchesCategory && (item.nombre?.toLowerCase().includes(searchTerm) || item.propietario_producto?.toLowerCase().includes(searchTerm));
        });
        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = data.map(row => `
            <tr class="border-b ${row.retirado ? 'bg-green-100' : 'hover:bg-gray-50'}">
                <td class="p-3 border">${row.pedido_id || '-'}</td>
                <td class="p-3 border">${row.nombre || ''} ${row.apellidos || ''}</td>
                <td class="p-3 border">${row.producto || '-'}</td>
                <td class="p-3 border text-sm">${row.propietario_producto || '-'}</td>
                <td class="p-3 border text-center">
                    <input type="checkbox" ${row.retirado ? 'checked' : ''} onchange="toggleRetirado(${row.id}, this.checked)">
                </td>
                <td class="p-3 border text-xs text-gray-500">${row.fecha_retirada || '-'}</td>
            </tr>
        `).join('');
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const allInserts = [];

            rows.forEach(r => {
                const pedido = String(getVal(r, 'Nº de pedido'));
                const bNombre = String(getVal(r, 'Nombre'));
                const bApellidos = String(getVal(r, 'Apellidos'));
                
                // Dividimos productos por líneas
                const productos = String(getVal(r, 'Producto')).split(/\r?\n/).filter(p => p.trim() !== "");
                
                // Dividimos variaciones (tickets) de forma flexible
                const rawVariacion = String(getVal(r, 'Variación') || "");
                const tickets = rawVariacion.split(/[\r\n|]+/).filter(t => t.trim() !== "");

                // ITERAMOS SOBRE PRODUCTOS (esta es la cantidad real de filas que debe haber)
                for (let i = 0; i < productos.length; i++) {
                    // Si existe un ticket para este índice, lo usamos. Si no, usamos al comprador.
                    const propietario = (tickets[i] && tickets[i].length > 3) ? tickets[i] : `${bNombre} ${bApellidos}`;
                    
                    allInserts.push({
                        pedido_id: pedido,
                        apellidos: bApellidos,
                        nombre: bNombre,
                        producto: productos[i],
                        propietario_producto: propietario
                    });
                }
            });
            
            // Subimos a Supabase
            const { error } = await db.from('tickets').insert(allInserts);
            if(error) {
                console.error(error);
                alert("Error al guardar: " + error.message);
            } else {
                alert("Importación exitosa. Se han creado " + allInserts.length + " filas.");
                init();
            }
        };
        reader.readAsArrayBuffer(file);
    });

    init();
</script>
</body>
</html>
